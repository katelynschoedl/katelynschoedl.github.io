experience:
  - title: "Research Coordinator (Photonics)"
    organization: "University of Washington"
    department: "<a href='https://fiberlab.uw.edu/' class='sneaky-link'>College of the Environment, Department of Earth & Space Sciences</a>"
    location: "Seattle, WA"
    dates: "May 2024 – May 2025"
    responsibilities:
      - "Operated, evaluated, and deployed fiber-optic interrogator systems (Sintella Onyx, ASN OptoDAS, FEBUS G1-C) for DAS/DTS/DSS sensing modes across seismic, ocean acoustic, and glacier/ice-ocean dynamics applications."
      - "Conducted field deployments across six sites including offshore fiber installations in Homer AK, San Juan Islands WA, and Morro Bay CA, and seismic monitoring deployments at Mt. Rainier and Alpental Ski Resort WA; handled all pre-deployment acceptance testing, independent equipment transport, live-buffer drive swaps, and ferry and vehicle logistics."
      - "Maintained daily operational oversight of concurrent DAS deployments across domestic and international field sites, managing data acquisition systems, remote monitoring infrastructure, and storage logistics across petabyte-scale datasets."
      - "Configured remote network access for deployed interrogator systems, coordinated RAID storage architecture decisions with university IT, and ensured federal data handling compliance including Navy data scrubbing protocols for oceanographic datasets."
      - "Coordinated international equipment shipments and customs carnets for Antarctic and Greenland deployments; managed procurement and lab inventory; facilitated dataset publication through DOI creation with UW Libraries; collaborated closely with USGS, EarthScope, and PNSN; contributed to and credited in <a href='https://pubs.geoscienceworld.org/ssa/srl/article/96/2A/784/652443/Multiplexed-Distributed-Acoustic-Sensing-Offshore' class='sneaky-link'>Shi et al. 2025, Seismological Research Letters.</a>"
      - "Actively participated in research group colloquia and engaged in future planning discussions; contributed to signal analysis including data cross-correlation and live characterization datasets."

  - title: "Hardware Engineer II (Signal Integrity)"
    organization: "Microsoft"
    department: "Cloud AI Hardware and Advanced Signal Engineering"
    location: "Seattle, WA"
    dates: "September 2021 – September 2023"
    responsibilities:
      - "Performed passive and active signal integrity characterization of PCIe and DDR5 traces across FPGA die, custom silicon packaging, connectors, and board-level interconnects using differential probing, VNA S-parameter analysis, and time-domain eye-diagram methods."
      - "Identified component-level signal integrity defects through comparative validation of boards across manufacturers and production origins, enabling root cause isolation and cost savings in hardware qualification."
      - "Supported stackup design decisions alongside motherboard EEs, contributing to material selection and layer thickness tradeoffs that determined high-speed signal propagation behavior."
      - "Built end-to-end simulation models of signal paths from silicon to GPU and PCIe endpoints using ANSYS HFSS and Keysight ADS, analyzing microbend and geometry effects on transmission performance."

  - title: "Hardware Design Engineer (Satellite Avionics)"
    organization: "Amazon"
    department: "Project Kuiper"
    location: "Seattle, WA"
    dates: "April 2020 – September 2021"
    responsibilities:
      - "Owned end-to-end hardware development for magnetometer and sun sensor subsystems during early-phase pre-PDR program development (prior to launch provider selection and during initial lab standup) including electrical, mechanical, and functional requirements definition, FOV analysis, and ConOps documentation."
      - "Led component selection, schematic design, and PCB layout for avionics sensor prototypes; coordinated with contract manufacturers on assembly requirements and parts library verification."
      - "Performed sensor bring-up, functional validation, and photodiode characterization using test tools such as sun emulator, thermal chamber, vibration test bed, and Helmholtz coil; conducted field validation with standalone prototype hardware."
      - "Designed and populated custom test boards for heavy-ion single-event effects (SEE) characterization at the Lawrence Berkeley National Laboratory <a href='https://cyclotron.lbl.gov/home' class='sneaky-link'>88-Inch Cyclotron;</a> prepared delidded commercial components, coordinated beamline exposure parameters, and performed pre- and post-irradiation functional testing of semiconductor devices; contributed to Kuiper's internal COTS component radiation qualification library."
      - "Supported PDR and CDR design reviews and contributed to cross-team integration reviews for bus avionics sensor suite."
      - "Maintained comprehensive engineering documentation across requirements, design decisions, test results, and manufacturing handoff throughout full hardware development lifecycle."

  - title: "Technical Program Manager (Robotic Automation Prototypes)"
    organization: "Amazon"
    department: "Worldwide Technical Engineering Services"
    location: "Seattle, WA"
    dates: "June 2019 – March 2020"
    responsibilities:
      - "Coordinated nationwide deployment of alpha and beta PLC-based robotic automation systems across Amazon fulfillment centers, serving as liaison between robot manufacturers, software vendors, and internal engineering and operations teams."
      - "Maintained program schedules, deployment readiness documentation, and risk review standardization across pilot programs."
      - "Supported on-site commissioning, vendor evaluations, and operational handoff for new automation systems."

