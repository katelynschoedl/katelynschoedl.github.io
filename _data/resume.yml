profile:
  objective: "Electrical engineer and research coordinator with a background in satellite avionics hardware, high-speed signal integrity, and fiber-optic sensing systems for geophysical field research."
  seeking: "I am a US citizen from Seattle, Washington currently based in Grenoble, France on a long-stay visa. I am actively seeking research positions and graduate thesis topics, particularly involving cryospheric and ocean instrumentation, field experiments, photonics systems, optical scattering, acoustics, and coherent sensing methods."

